<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chewiwi | Travel Through Food</title>
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="navbar-placeholder"></div>

    <!-- PRODUCTS SECTION -->
    <div class="container py-5">
        <h1 class="text-center mb-5 main-title">Travel Through Food</h1>
        <div class="row" id="product-list"></div>
        <div class="text-center mb-4">
          <button class="btn btn-outline-primary" onclick="filterProducts('Korea')">Korea</button>
          <button class="btn btn-outline-primary" onclick="filterProducts('Japan')">Japan</button>
          <button class="btn btn-outline-secondary" onclick="filterProducts('All')">All</button>
        </div>
    
        <div id="product-list" class="row"></div>
    </div>

    <script src="product_list.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="js/loadComponents.js"></script>

    <script>

        $(function () {
        $("#navbar-placeholder").load("navbar.html");
        });


        import products from './product_list.js';

        const productList = document.getElementById("product-list");

        products.forEach(product => {
            const productCard = document.createElement("div");
            productCard.className = "col-md-6 col-lg-4";
            productCard.innerHTML = `
                <div class="card h-100">
                    <img src="${product.image}" class="card-img-top" alt="${product.name}">
                    <div class="card-body">
                        <h5 class="card-title">${product.name}</h5>
                        <p class="card-text">₱${product.price.toLocaleString()}</p>
                        <a href="product_details.html?id=${product.id}" class="btn btn-primary">View Details</a>
                    </div>
                </div>
            `;
            productList.appendChild(productCard);
        });

        function filterProducts(country) {
            productList.innerHTML = ""; // Clear the product list

            const filteredProducts = country === "All" 
                ? products 
                : products.filter(product => product.country === country);

            filteredProducts.forEach(product => {
                const productCard = document.createElement("div");
                productCard.className = "col-md-6 col-lg-4";
                productCard.innerHTML = `
                    <div class="card h-100">
                        <img src="${product.image}" class="card-img-top" alt="${product.name}">
                        <div class="card-body">
                            <h5 class="card-title">${product.name}</h5>
                            <p class="card-text">₱${product.price.toLocaleString()}</p>
                            <a href="product_details.html?id=${product.id}" class="btn btn-primary">View Details</a>
                        </div>
                    </div>
                `;
                productList.appendChild(productCard);
            });
        }

        // Load all products by default
        filterProducts("All"); 

        displayProducts(products);
        
    </script>

</body>
</html>
