<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chewiwi | Your Cart</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <!-- Bootstrap Icons for the Trash Can -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body class="bg-light">

<div class="container py-5">
    <!-- Top Card: Product List -->
    <div class="cart-container p-4 mb-4">
        <div class="row fw-bold text-uppercase small pb-2 border-bottom border-secondary mb-3">
            <div class="col-5">Products</div>
            <div class="col-2 text-center">Price</div>
            <div class="col-3 text-center">Qty</div>
            <div class="col-2 text-end">Total</div>
        </div>

        <!-- Items will be injected here by JS -->
        <div id="cart-items-list">
            <!-- Example Row -->
            <div class="row align-items-center mb-4 cart-item">
                <div class="col-5 d-flex align-items-center">
                    <div class="product-img-placeholder me-3"></div>
                    <div class="product-info-lines">
                        <div class="line"></div>
                        <div class="line"></div>
                        <div class="line"></div>
                    </div>
                </div>
                <div class="col-2 text-center text-success fw-bold">₱0.00</div>
                <div class="col-3 d-flex justify-content-center">
                    <div class="qty-control d-flex align-items-center">
                        <button class="btn btn-sm btn-qty">+</button>
                        <input type="text" value="1" class="form-control form-control-sm text-center mx-1 qty-input" readonly>
                        <button class="btn btn-sm btn-qty">-</button>
                    </div>
                </div>
                <div class="col-2 text-end d-flex align-items-center justify-content-end">
                    <span class="text-success fw-bold me-3">₱0.00</span>
                    <button class="btn btn-link text-dark p-0"><i class="bi bi-trash3-fill h5"></i></button>
                </div>
            </div>
        </div>
    </div>

    <!-- Bottom Card: Order Summary -->
    <div class="row">
        <div class="col-lg-4">
            <div class="summary-container p-4">
                <h5 class="fw-bold mb-4">Order Summary</h5>
                <div class="d-flex justify-content-between mb-2">
                    <span class="text-muted">Subtotal</span>
                    <span id="cart-subtotal" class="fw-bold">₱0.00</span>
                </div>
                <div class="d-flex justify-content-between mb-3">
                    <span class="text-muted">Shipping</span>
                    <span id="cart-shipping" class="fw-bold">₱0.00</span>
                </div>
                <hr>
                <div class="d-flex justify-content-between mb-4 h5">
                    <span class="fw-bold">Total</span>
                    <span id="cart-total" class="fw-bold">₱0.00</span>
                </div>
                <a href="chckout.html" class="btn btn-checkout w-100 fw-bold">Proceed to Checkout</a>
            </div>
        </div>
    </div>
</div>

<script src="crt.js"></script>
<script src="auth.js"></script>
</body>
</html>
