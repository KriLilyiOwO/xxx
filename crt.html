<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chewiwi | Your Cart</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body class="bg-light">

    <nav class="navbar sticky-top shadow-sm bg-white">
        <div class="container">
            <a class="navbar-brand fw-bold" href="index.html">CHEWIWI</a>
            
            <div class="d-flex align-items-center" id="nav-actions">
                <a href="crt.html" class="btn btn-link text-dark me-2 position-relative text-decoration-none">
                    <i class="bi bi-cart3 h5"></i>
                </a>
                
                <div class="vr me-3" style="height: 20px; opacity: 0.2;"></div>

                <div class="d-flex align-items-center">
                    <button class="btn btn-link text-dark me-2 text-decoration-none fw-bold small" data-bs-toggle="modal" data-bs-target="#loginModal">
                        Login
                    </button>
                    <button class="btn btn-chewiwi btn-sm px-3" data-bs-toggle="modal" data-bs-target="#signupModal">
                        Sign Up
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <div class="container py-5">
        <h2 class="fw-bold mb-4">Your Shopping Cart</h2>

        <div class="row">
            <div class="col-lg-8">
                <div class="cart-container p-4 mb-4 bg-white shadow-sm" style="border-radius: 20px;">
                    <div class="row fw-bold text-uppercase small pb-2 border-bottom border-secondary mb-3">
                        <div class="col-5">Products</div>
                        <div class="col-2 text-center">Price</div>
                        <div class="col-3 text-center">Qty</div>
                        <div class="col-2 text-end">Total</div>
                    </div>

                    <div id="cart-items-list">
                        <p class="text-center py-5 text-muted">Checking your cart...</p>
                    </div>
                </div>

                <a href="index.html" class="btn btn-link text-dark text-decoration-none p-0">
                    <i class="bi bi-arrow-left"></i> Continue Shopping
                </a>
            </div>

            <div class="col-lg-4">
                <div class="summary-container p-4 bg-white shadow-sm" style="border-radius: 20px;">
                    <h5 class="fw-bold mb-4">Order Summary</h5>
                    <div class="d-flex justify-content-between mb-2">
                        <span class="text-muted">Subtotal</span>
                        <span id="cart-subtotal" class="fw-bold">₱0.00</span>
                    </div>
                    <div class="d-flex justify-content-between mb-3">
                        <span class="text-muted">Shipping</span>
                        <span id="cart-shipping" class="fw-bold">₱0.00</span>
                    </div>
                    <hr>
                    <div class="d-flex justify-content-between mb-4 h5">
                        <span class="fw-bold">Total</span>
                        <span id="cart-total" class="fw-bold text-success">₱0.00</span>
                    </div>
                    <a href="chckout.html" class="btn btn-checkout w-100 fw-bold py-3 text-white">Proceed to Checkout</a>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="loginModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 shadow" style="border-radius: 20px;">
                <div class="modal-body p-5">
                    <h3 class="fw-bold mb-4">Welcome Back</h3>
                    <form onsubmit="handleLogin(event)">
                        <div class="mb-3">
                            <label class="form-label text-muted small">Email Address</label>
                            <input type="email" id="emailInput" class="form-control custom-input" placeholder="admin@chewiwi.com" required>
                        </div>
                        <div class="mb-4">
                            <label class="form-label text-muted small">Password</label>
                            <input type="password" id="passInput" class="form-control custom-input" required>
                        </div>
                        <button type="submit" class="btn btn-chewiwi w-100 py-3">Sign In</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="auth.js"></script>
    <script src="crt.js"></script>
</body>
</html>
