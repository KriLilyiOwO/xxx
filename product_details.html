<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kyoto Japan Kit</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <link rel="stylesheet" href="style.css">
    <style>
        body {
            background-color: #f6f5ef;
            font-family: Arial, sans-serif;
        }

        .product-wrapper {
            border: 2px solid #6b4b2a;
            padding: 60px 40px;
            min-height: 100vh;
        }

        .main-image {
            width: 400px;
            height: 400px;
            border: 3px solid #c59b23;
            border-radius: 15px;
            background-color: #ddd;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .main-image img {
            object-fit: cover;
            width: 100%;
            height: 100%;
            border-radius: 15px;
        }

        .thumb {
            height: 90px;
            width: 90px;
            border: 3px solid #c59b23;
            background-color: #ddd;
            border-radius: 5px;
        }

        .product-title {
            color: #5b432e;
            font-weight: 800;
        }

        .price {
            color: #228b22;
            font-size: 2rem;
            font-weight: bold;
        }

        .desc-line {
            height: 16px;
            background-color: #000;
            border-radius: 20px;
            margin-bottom: 35px;
        }

        .quantity-box {
            border: 2px solid #9b7b2b;
            border-radius: 10px;
            overflow: hidden;
            display: inline-flex;
            align-items: center;
        }

        .quantity-box button {
            border: none;
            background: transparent;
            width: 45px;
            height: 45px;
            font-size: 1.5rem;
            font-weight: bold;
        }

        .quantity-box span {
            width: 50px;
            text-align: center;
            font-size: 1.5rem;
        }

        .cart-btn {
            background-color: #c8ff1a;
            border: 2px solid #9b7b2b;
            border-radius: 10px;
            width: 230px;
            font-weight: bold;
            font-size: 1.2rem;
        }
    </style>
</head>
<body>

    <div class="container-fluid p-4">
        <div class="product-wrapper">

            <div class="row g-5 align-items-start">

                <!-- LEFT -->
                <div class="col-lg-5">

                    <div class="main-image d-flex justify-content-center align-items-center">
                        <i class="bi bi-image text-secondary" style="font-size:4rem;"></i>
                    </div>

                    <div class="d-flex gap-4 mt-5">

                        <div class="thumb d-flex align-items-center justify-content-center">
                            <i class="bi bi-image text-secondary"></i>
                        </div>

                        <div class="thumb d-flex align-items-center justify-content-center">
                            <i class="bi bi-image text-secondary"></i>
                        </div>

                        <div class="thumb d-flex align-items-center justify-content-center">
                            <i class="bi bi-image text-secondary"></i>
                        </div>

                    </div>
                </div>


                <!-- RIGHT -->
                <div class="col-lg-6">

                    <h1 class="product-title mb-3">KYOTO, JAPAN KIT</h1>

                    <div class="price mb-2">0.00</div>

                    <div class="mb-4 text-warning fs-1">
                        <i class="bi bi-star-fill"></i>
                        <i class="bi bi-star-fill"></i>
                        <i class="bi bi-star-fill"></i>
                        <i class="bi bi-star-fill"></i>
                        <i class="bi bi-star-half"></i>
                    </div>


                    <div class="d-flex align-items-center gap-3 mt-5 flex-wrap">

                        <h2 class="fw-bold">Quantity</h2>

                        <div class="quantity-box">
                            <button>-</button>
                            <span>1</span>
                            <button>+</button>
                        </div>
                    </div>

                    <button class="cart-btn mt-5 py-3">
                        Add to Cart
                    </button>

                </div>
            </div>
        </div>
    </div>


    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const productId = parseInt(urlParams.get('id'));

        const products = [
            { id: 1, name: "Tokyo Sakura Date Night Kit", country:"Japan", price: 1890, image: "https://images.unsplash.com/photo-1515003197210-e0cd71810b5f?q=80&w=800" },
            { id: 2, name: "Busan K-Drama Comfort Box", country:"Korea", price: 1650, image: "https://images.unsplash.com/photo-1546069901-ba9599a7e63c?q=80&w=800" },
            { id: 3, name: "Tokyo Anime Movie Night Kit", country:"Japan", price: 2100, image: "https://images.unsplash.com/photo-1565299624946-b28f40a0ae38?q=80&w=800" },
            { id: 4, name: "Busan Korean BBQ Home Kit", country:"Korea", price: 2450, image: "https://images.unsplash.com/photo-1555939594-58d7cb561ad1?q=80&w=800" },
            { id: 5, name: "Tokyo Harajuku Sweet Treat Box", country:"Japan", price: 1450, image: "https://images.unsplash.com/photo-1504674900247-0877df9cc836?q=80&w=800" },
            { id: 6, name: "Busan Beach Picnic Kit", country:"Korea", price: 1750, image: "https://images.unsplash.com/photo-1529042410759-befb1204b468?q=80&w=800" }
        ];

        const product = products.find(p => p.id === productId);

        if (product) {
            document.querySelector(".main-image").innerHTML = `<img src="${product.image}" alt="${product.name}" class="img-fluid">`;
            document.querySelector(".product-title").textContent = product.name;
            document.querySelector(".price").textContent = `₱${product.price.toLocaleString()}`;
        }

        const quantityBox = document.querySelector(".quantity-box span");
        const decrementButton = document.querySelector(".quantity-box button:first-child");
        const incrementButton = document.querySelector(".quantity-box button:last-child");

        let quantity = 1; // Default quantity

        decrementButton.addEventListener("click", () => {
            if (quantity > 1) {
                quantity--;
                quantityBox.textContent = quantity;
            }
        });

        incrementButton.addEventListener("click", () => {
            quantity++;
            quantityBox.textContent = quantity;
        });

        document.querySelector(".cart-btn").addEventListener("click", () => {
            let cart = JSON.parse(localStorage.getItem("cart")) || [];
            const existing = cart.find(item => item.id === product.id);

            if (existing) {
                existing.quantity += quantity;
            } else {
                cart.push({ ...product, quantity });
            }

            localStorage.setItem("cart", JSON.stringify(cart));
            alert(`${quantity} x ${product.name} added to cart!`);
            window.location.href = "products.html";
        });
    </script>
</body>
</html>
