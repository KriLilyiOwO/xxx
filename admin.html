<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chewiwi Admin | CRUD Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-light" onload="loadAdminProducts()">

    <nav class="navbar sticky-top shadow-sm bg-white">
        <div class="container">
            <a class="navbar-brand fw-bold" href="index.html">CHEWIWI <span class="badge bg-dark ms-2">ADMIN</span></a>
            <button class="btn btn-sm btn-link text-danger text-decoration-none fw-bold" onclick="logoutUser()">Logout</button>
        </div>
    </nav>

    <div class="container py-5">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="fw-bold">Manage Inventory</h2>
            <button class="btn btn-chewiwi" onclick="showAddModal()">+ Add New Kit</button>
        </div>

        <div class="bg-white shadow-sm" style="border-radius: 20px; overflow: hidden;">
            <table class="table table-hover align-middle mb-0">
                <thead class="bg-dark text-white">
                    <tr>
                        <th class="ps-4">Product</th>
                        <th>Price</th>
                        <th class="text-end pe-4">Actions</th>
                    </tr>
                </thead>
                <tbody id="admin-product-table">
                    </tbody>
            </table>
        </div>
    </div>

    <div class="modal fade" id="editModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content p-4">
                <h4 class="fw-bold">Update Product</h4>
                <input type="hidden" id="edit-id">
                <div class="mb-3">
                    <label class="small text-muted">Price (₱)</label>
                    <input type="number" id="edit-price" class="form-control">
                </div>
                <button class="btn btn-chewiwi w-100" onclick="saveUpdate()">Save Changes</button>
            </div>
        </div>
    </div>

    <script src="auth.js"></script>
    <script>
        // Use the products from localStorage or the default ones
        let allProducts = JSON.parse(localStorage.getItem("storedProducts")) || [
            { id: 1, name: "Tokyo Sakura Date Night Kit", price: 1890 },
            { id: 2, name: "Busan K-Drama Comfort Box", price: 1650 }
        ];

        function loadAdminProducts() {
            const table = document.getElementById('admin-product-table');
            table.innerHTML = '';
            allProducts.forEach((p, index) => {
                table.innerHTML += `
                    <tr>
                        <td class="ps-4 fw-bold">${p.name}</td>
                        <td>₱${p.price.toLocaleString()}</td>
                        <td class="text-end pe-4">
                            <button class="btn btn-sm btn-outline-primary me-1" onclick="openEdit(${p.id}, ${p.price})">
                                <i class="bi bi-pencil"></i>
                            </button>
                            <button class="btn btn-sm btn-outline-danger" onclick="deleteProduct(${index})">
                                <i class="bi bi-trash"></i>
                            </button>
                        </td>
                    </tr>`;
            });
            localStorage.setItem("storedProducts", JSON.stringify(allProducts));
        }

        function deleteProduct(index) {
            if(confirm("Delete this item?")) {
                allProducts.splice(index, 1);
                loadAdminProducts();
            }
        }

        function openEdit(id, price) {
            document.getElementById('edit-id').value = id;
            document.getElementById('edit-price').value = price;
            new bootstrap.Modal(document.getElementById('editModal')).show();
        }

        function saveUpdate() {
            const id = parseInt(document.getElementById('edit-id').value);
            const newPrice = parseInt(document.getElementById('edit-price').value);
            const item = allProducts.find(p => p.id === id);
            if(item) {
                item.price = newPrice;
                loadAdminProducts();
                location.reload(); // Refresh to sync
            }
        }
    </script>
</body>
</html>
