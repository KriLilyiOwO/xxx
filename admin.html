<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chewiwi Admin | Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-light">

    <nav class="navbar sticky-top shadow-sm bg-white">
        <div class="container">
            <a class="navbar-brand fw-bold" href="index.html">CHEWIWI <span class="badge bg-dark ms-2">ADMIN</span></a>
            <div class="d-flex align-items-center" id="nav-actions">
                <a href="index.html" class="btn btn-sm btn-outline-dark me-2">View Shop</a>
                <button class="btn btn-sm btn-link text-danger text-decoration-none fw-bold" onclick="logoutUser()">Logout</button>
            </div>
        </div>
    </nav>

    <div class="container py-5">
        <div class="row mb-4">
            <div class="col-md-8">
                <h2 class="fw-bold">Inventory Management</h2>
                <p class="text-muted">Manage your Tokyo and Busan curated food kits.</p>
            </div>
            <div class="col-md-4 text-md-end">
                <button class="btn btn-chewiwi shadow-sm" onclick="alert('Feature: Add New Product coming soon!')">
                    <i class="bi bi-plus-lg"></i> Add New Kit
                </button>
            </div>
        </div>

        <div class="row g-3 mb-5">
            <div class="col-md-4">
                <div class="p-4 bg-white shadow-sm border-0" style="border-radius: 15px;">
                    <small class="text-muted text-uppercase fw-bold">Total Products</small>
                    <h3 class="fw-bold mb-0">6</h3>
                </div>
            </div>
            <div class="col-md-4">
                <div class="p-4 bg-white shadow-sm border-0" style="border-radius: 15px;">
                    <small class="text-muted text-uppercase fw-bold">Active Orders</small>
                    <h3 class="fw-bold mb-0">12</h3>
                </div>
            </div>
            <div class="col-md-4">
                <div class="p-4 bg-white shadow-sm border-0" style="border-radius: 15px;">
                    <small class="text-muted text-uppercase fw-bold">Revenue</small>
                    <h3 class="fw-bold mb-0 text-success">₱24,500</h3>
                </div>
            </div>
        </div>

        <div class="bg-white shadow-sm" style="border-radius: 20px; overflow: hidden;">
            <table class="table table-hover align-middle mb-0">
                <thead class="bg-dark text-white">
                    <tr>
                        <th class="ps-4 py-3">Product Name</th>
                        <th class="py-3">Price</th>
                        <th class="py-3">Category</th>
                        <th class="py-3 text-end pe-4">Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td class="ps-4">
                            <div class="d-flex align-items-center">
                                <div class="bg-light rounded me-3" style="width: 40px; height: 40px; background: url('https://images.unsplash.com/photo-1515003197210-e0cd71810b5f?q=80&w=100') center/cover;"></div>
                                <span class="fw-bold">Tokyo Sakura Date Night</span>
                            </div>
                        </td>
                        <td>₱1,890</td>
                        <td><span class="badge rounded-pill bg-light text-dark border">Tokyo</span></td>
                        <td class="text-end pe-4">
                            <button class="btn btn-sm btn-outline-primary me-1" onclick="alert('Update Clicked')"><i class="bi bi-pencil"></i></button>
                            <button class="btn btn-sm btn-outline-danger" onclick="alert('Delete Clicked')"><i class="bi bi-trash"></i></button>
                        </td>
                    </tr>
                    <tr>
                        <td class="ps-4">
                            <div class="d-flex align-items-center">
                                <div class="bg-light rounded me-3" style="width: 40px; height: 40px; background: url('https://images.unsplash.com/photo-1546069901-ba9599a7e63c?q=80&w=100') center/cover;"></div>
                                <span class="fw-bold">Busan K-Drama Box</span>
                            </div>
                        </td>
                        <td>₱1,650</td>
                        <td><span class="badge rounded-pill bg-light text-dark border">Busan</span></td>
                        <td class="text-end pe-4">
                            <button class="btn btn-sm btn-outline-primary me-1"><i class="bi bi-pencil"></i></button>
                            <button class="btn btn-sm btn-outline-danger"><i class="bi bi-trash"></i></button>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        const user = JSON.parse(localStorage.getItem("currentUser"));
        if (!user || user.role !== 'admin') {
            alert("Access Denied. Admins only.");
            window.location.href = "index.html";
        }
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="auth.js"></script>
    <script src="crt.js"></script>
</body>
</html>
