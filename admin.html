<div class="modal fade" id="productModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0 shadow-lg" style="border-radius: 20px;">
            <div class="modal-body p-5">
                <h3 class="fw-bold mb-4" id="modalTitle">Product Details</h3>
                <input type="hidden" id="edit-id">
                
                <div class="mb-3">
                    <label class="form-label text-muted small fw-bold">Product Name</label>
                    <input type="text" id="prod-name" class="form-control" placeholder="e.g., Tokyo Ramen Kit" required>
                </div>
                <div class="mb-3">
                    <label class="form-label text-muted small fw-bold">Price (₱)</label>
                    <input type="number" id="prod-price" class="form-control" placeholder="1500" required>
                </div>
                <div class="mb-4">
                    <label class="form-label text-muted small fw-bold">Image URL</label>
                    <input type="text" id="prod-img" class="form-control" placeholder="Link to image..." required>
                </div>
                
                <button class="btn btn-chewiwi w-100 py-3 fw-bold" onclick="handleSave()">Save Changes</button>
            </div>
        </div>
    </div>
</div>

<script>
    // Load existing data or use empty array
    let allProducts = JSON.parse(localStorage.getItem("storedProducts")) || [];
    let editMode = false;
    let productModal;

    document.addEventListener('DOMContentLoaded', () => {
        productModal = new bootstrap.Modal(document.getElementById('productModal'));
        loadAdminTable();
    });

    // READ: Display all items in the table
    function loadAdminTable() {
        const tableBody = document.getElementById('admin-product-table');
        if(!tableBody) return;

        tableBody.innerHTML = '';
        allProducts.forEach((p, index) => {
            tableBody.innerHTML += `
                <tr>
                    <td class="ps-4">
                        <div class="d-flex align-items-center">
                            <img src="${p.image}" class="rounded me-3" style="width:40px; height:40px; object-fit:cover;">
                            <span class="fw-bold">${p.name}</span>
                        </div>
                    </td>
                    <td>₱${p.price.toLocaleString()}</td>
                    <td class="text-end pe-4">
                        <button class="btn btn-sm btn-outline-primary me-1" onclick="openEdit(${p.id})">
                            <i class="bi bi-pencil"></i>
                        </button>
                        <button class="btn btn-sm btn-outline-danger" onclick="deleteProduct(${index})">
                            <i class="bi bi-trash"></i>
                        </button>
                    </td>
                </tr>`;
        });
        // Sync to LocalStorage so index.html gets the updates
        localStorage.setItem("storedProducts", JSON.stringify(allProducts));
    }

    // CREATE: Open modal for a new item
    function showAddModal() {
        editMode = false;
        document.getElementById('modalTitle').innerText = "Add New Kit";
        document.getElementById('edit-id').value = '';
        document.getElementById('prod-name').value = '';
        document.getElementById('prod-price').value = '';
        document.getElementById('prod-img').value = '';
        productModal.show();
    }

    // UPDATE: Open modal with existing data
    function openEdit(id) {
        editMode = true;
        const item = allProducts.find(p => p.id === id);
        document.getElementById('modalTitle').innerText = "Edit Product";
        document.getElementById('edit-id').value = item.id;
        document.getElementById('prod-name').value = item.name;
        document.getElementById('prod-price').value = item.price;
        document.getElementById('prod-img').value = item.image;
        productModal.show();
    }

    // SAVE LOGIC (Handles both Create and Update)
    function handleSave() {
        const name = document.getElementById('prod-name').value;
        const price = parseInt(document.getElementById('prod-price').value);
        const img = document.getElementById('prod-img').value;

        if(!name || !price || !img) return alert("Please fill in all fields!");

        if (editMode) {
            const id = parseInt(document.getElementById('edit-id').value);
            const index = allProducts.findIndex(p => p.id === id);
            allProducts[index] = { ...allProducts[index], name, price, image: img };
        } else {
            const newId = allProducts.length > 0 ? Math.max(...allProducts.map(p => p.id)) + 1 : 1;
            allProducts.push({ id: newId, name, price, image: img });
        }

        loadAdminTable();
        productModal.hide();
    }

    // DELETE LOGIC
    function deleteProduct(index) {
        if(confirm("Are you sure you want to remove this product?")) {
            allProducts.splice(index, 1);
            loadAdminTable();
        }
    }
</script>
