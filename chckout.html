<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chewiwi | Checkout</title>
    <!-- Bootstrap 5 for layout -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Links to your custom styling -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Simple Navigation -->
    <nav class="navbar mb-4 shadow-sm">
        <div class="container d-flex justify-content-between">
            <a class="navbar-brand fw-bold" href="index.html">CHEWIWI</a>
            <a href="products.html" class="btn btn-sm btn-outline-secondary">← Back to shop</a>
        </div>
    </nav>

    <div class="container py-4">
        <div class="row g-4">
            
            <!-- LEFT: SHIPPING FORM -->
            <div class="col-lg-7">
                <div class="checkout-card p-4 h-100">
                    <h4 class="mb-4 section-title">Shipping Information</h4>
                    <form id="checkout-form">
                        
                        <!-- Name Input -->	
						<div class="row">
                            <div class="col-md-6 mb-3">
                               <label class="form-label">First Name</label>
                            <input type="text" class="form-control custom-input" id="custf-name" placeholder="Enter your first name" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Last Name</label>
                            <input type="text" class="form-control custom-input" id="custl-name" placeholder="Enter your last name" required>
                            </div>
                        </div>
                        
                        <!-- Email and Phone Row -->
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Email Address</label>
                                <input type="email" class="form-control custom-input" id="cust-email" placeholder="example@email.com" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Phone Number</label>
                                <input type="tel" class="form-control custom-input" id="cust-phone" placeholder="Enter your phone number" required>
                            </div>
                        </div>

                        <!-- Country and ZIP Row -->
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Country</label>
                                <input type="text" class="form-control custom-input country-readonly" value="Philippines" readonly>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">ZIP Code</label>
                                <input type="text" class="form-control custom-input" placeholder="4 Digit Code" required>
                            </div>
                        </div>

                        <!-- Province and City Row -->
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Province</label>
                                <select id="province-dropdown" class="form-select custom-input" required>
                                    <option value="" selected disabled>Select Province</option>
                                </select>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">City / Municipality</label>
                                <select id="city-dropdown" class="form-select custom-input" required disabled>
                                    <option value="" selected disabled>Select Province First</option>
                                </select>
                            </div>
                        </div>

                        <!-- Large Address Box -->
                        <div class="mb-3">
                            <label class="form-label">Specific Address Details</label>
                            <textarea class="form-control custom-input address-box" placeholder="House No., Street, Brgy, Landmarks..." required></textarea>
                        </div>
                    </form>
                </div>
            </div>

            <!-- RIGHT: ORDER SUMMARY -->
            <div class="col-lg-5">
                <div class="checkout-card p-4 sticky-top summary-container">
                    <div class="d-flex justify-content-between align-items-center mb-4">
                        <h4 class="section-title mb-0">Order Summary</h4>
                       
                    </div>
                    
                    <!-- Items generated by JS -->
                    <div id="summary-items" class="mb-4"></div>
                    
                    <!-- Cost Calculations -->
                    <div class="calculation-box pt-3">
                        <div class="summary-line">
                            <span class="text-muted">Subtotal</span>
                            <span id="subtotal-val" class="fw-bold">₱0.00</span>
                        </div>
                        <div class="summary-line">
                            <span class="text-muted">Shipping</span>
                            <span id="shipping-val" class="fw-bold">₱0.00</span>
                        </div>
                        <hr class="my-3 dashed-line">
                        <div class="summary-line h5 mb-0">
                            <span class="fw-bold">Total</span>
                            <span id="final-total" class="fw-bold text-success">₱0.00</span>
                        </div>
                    </div>

                    <!-- Payment and Legal -->
                    <div class="mt-4 payment-section p-3">
                        <label class="form-label fw-bold small text-uppercase mb-2">Payment Method</label>
                        <select class="form-select custom-input mb-3">
                            <option>Cash on Delivery</option>
                            <option>GCash / Maya</option>
                        </select>

                        <p class="legal-text mb-3">
                            By placing an order, you agree to the <strong>Chewiwi Shop Terms of Use and Sale</strong> and acknowledge that you have read our <strong>Privacy Policy</strong>.
                        </p>
                        
                        <button type="submit" form="checkout-form" class="btn btn-place-order w-100 py-3 fw-bold">Place Order</button>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
	<script src="auth.js"></script>
	<script src="crt.js"></script>
    <script src="chckout.js"></script>
</body>
</html>
