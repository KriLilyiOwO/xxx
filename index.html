<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chewiwi | Travel Through Food</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="navbar sticky-top shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold" href="index.html">CHEWIWI</a>
            
            <div class="d-flex align-items-center" id="nav-actions">
                <a href="crt.html" class="btn btn-link text-dark me-2 position-relative text-decoration-none">
                    <i class="bi bi-cart3 h5"></i>
                </a>
                
                <div class="vr me-3" style="height: 20px; opacity: 0.2;"></div>

                <div class="d-flex align-items-center">
                    <button class="btn btn-link text-dark me-2 text-decoration-none fw-bold small" data-bs-toggle="modal" data-bs-target="#loginModal">
                        Login
                    </button>
                    <button class="btn btn-chewiwi btn-sm px-3" data-bs-toggle="modal" data-bs-target="#signupModal">
                        Sign Up
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <header class="hero-section text-center py-5">
        <div class="container py-5">
            <h1 class="main-title display-3 fw-bold mb-3">Travel Through Food</h1>
            <p class="lead text-muted mb-4 mx-auto" style="max-width: 600px;">
                Experience Tokyo and Busan from home. Our curated kits bring the street food experience straight to your doorstep.
            </p>
            <a href="#product-list" class="btn btn-checkout px-5 py-3 fw-bold">Shop Collection</a>
        </div>
    </header>

    <div class="container py-5">
        <div class="row" id="product-list">
            </div>
    </div>

    <footer class="py-5 bg-white border-top">
        <div class="container text-center">
            <p class="fw-bold mb-1">CHEWIWI</p>
            <p class="small text-muted mb-0">© 2026 Chewiwi Travel Food Kits. Xavier University ITCC 13.1</p>
        </div>
    </footer>

    <div class="modal fade" id="loginModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 shadow" style="border-radius: 20px;">
                <div class="modal-body p-5">
                    <div class="d-flex justify-content-between align-items-start mb-4">
                        <h3 class="fw-bold">Welcome Back</h3>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <form onsubmit="handleLogin(event)">
                        <div class="mb-3">
                            <label class="form-label text-muted small">Email Address</label>
                            <input type="email" id="emailInput" class="form-control custom-input" placeholder="admin@chewiwi.com" required>
                        </div>
                        <div class="mb-4">
                            <label class="form-label text-muted small">Password</label>
                            <input type="password" id="passInput" class="form-control custom-input" placeholder="••••••••" required>
                        </div>
                        <button type="submit" class="btn btn-chewiwi w-100 py-3 mb-3">Sign In</button>
                        <p class="text-center small text-muted">New here? <a href="#" class="text-dark fw-bold" data-bs-toggle="modal" data-bs-target="#signupModal">Create an account</a></p>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="signupModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 shadow" style="border-radius: 20px;">
                <div class="modal-body p-5">
                    <div class="d-flex justify-content-between align-items-start mb-4">
                        <h3 class="fw-bold">Join Chewiwi</h3>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <form onsubmit="event.preventDefault(); alert('Sign up successful! Please login.');">
                        <div class="mb-3">
                            <label class="form-label text-muted small">Full Name</label>
                            <input type="text" class="form-control custom-input" placeholder="Karylle Duroy" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label text-muted small">Email Address</label>
                            <input type="email" class="form-control custom-input" placeholder="user@chewiwi.com" required>
                        </div>
                        <div class="mb-4">
                            <label class="form-label text-muted small">Create Password</label>
                            <input type="password" class="form-control custom-input" placeholder="••••••••" required>
                        </div>
                        <button type="submit" class="btn btn-chewiwi w-100 py-3 mb-3">Create Account</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    
    <script src="auth.js"></script>
    <script src="crt.js"></script>
</body>
</html>
