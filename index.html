<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chewiwi</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <link rel="stylesheet" href="style.css">

    <style>
        body {
            background-color: #f6f5ef;
            font-family: Arial, sans-serif;
        }

        .hero-section {
            background-color: #e9e7d4;
            border: 2px solid #7b5b2b;
            border-top: none;
            padding: 50px 0;
        }

        .hero-left {
            background-color: #5b4a3b;
            color: white;
            padding: 40px;
            border-radius: 10px;
            min-height: 250px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .hero-btn,
        .view-btn,
        .cart-btn {
            background-color: #c8ff1a;
            border: none;
            color: #000;
            font-weight: bold;
            border-radius: 12px;
            padding: 10px 130px;
        }

        .hero-image {
            background-color: #ddd;
            height: 250px;
            border-radius: 10px;
        }

        .section-title {
            color: #c59b23;
            font-weight: bold;
        }

        .food-card {
            border: 3px solid #c59b23;
            border-radius: 15px;
            overflow: hidden;
            background: linear-gradient(to top, #8b6d3f, #f3efd5);
            transition: 0.3s;
        }

        .food-card:hover {
            transform: translateY(-5px);
        }

        .food-img {
            background-color: #ddd;
            height: 250px;
        }

        .footer {
            background-color: #5b432e;
            padding: 60px 0;
        }

        .footer-line {
            height: 6px;
            background-color: #f5f1d8;
            border-radius: 20px;
            margin-bottom: 20px;
        }

        .footer-bottom {
            height: 30px;
            background-color: #c8ff1a;
        }
    </style>
</head>
<body>

    <div id="navbar-placeholder"></div>


    <section class="hero-section">
        <div class="container">
            <div class="row align-items-center g-4">

                <div class="col-lg-5">
                    <div class="hero-left text-center">
                        <h2>Chew your way around the world</h2>

                        <a href="products.html"><button class="hero-btn mt-4">Explore</button></a>
                    </div>
                </div>

                <div class="col-lg-7 text-center">
                    <div class="hero-image d-flex align-items-center justify-content-center">
                        <i class="bi bi-image text-secondary" style="font-size:4rem;"></i>
                    </div>

                    <div class="mt-3">
                        <span class="badge rounded-pill bg-dark">&nbsp;</span>
                        <span class="badge rounded-pill" style="background:#dfff68;">&nbsp;</span>
                        <span class="badge rounded-pill" style="background:#dfff68;">&nbsp;</span>
                    </div>
                </div>
            </div>
        </div>
    </section>

     
    <section class="py-5">
        <div class="container text-center">

        <h2 class="section-title mb-3">
            Discover your favorite places through every bite
        </h2>

        <p class="text-muted mb-5">
            Curated food kits inspired by cities around the world.
        </p>

        <div class="row g-4">

            <!-- Card 1 -->
            <div class="col-md-6">
                <div class="food-card p-3">
                    <div class="food-img d-flex align-items-center justify-content-center rounded">
                        <i class="bi bi-image text-secondary" style="font-size:4rem;"></i>
                    </div>

                    <div class="mt-3">
                        <h3 class="fw-bold">Busan, Korea</h3>
                            <button class="view-btn px-5">View All</button>
                    </div>
                </div>
            </div>

            <!-- Card 2 -->
            <div class="col-md-6">
                <div class="food-card p-3">
                    <div class="food-img d-flex align-items-center justify-content-center rounded">
                        <i class="bi bi-image text-secondary" style="font-size:4rem;"></i>
                    </div>

                    <div class="mt-3">
                        <h3 class="fw-bold">Tokyo, Japan</h3>
                            <button class="view-btn px-5">View All</button>
                    </div>
                </div>
            </div>

        </div>
        </div>
    </section>


    <!-- Footer -->
    <footer>
        <div class="footer">
            <div class="container">
            </div>
        </div>

        <div class="footer-bottom"></div>
    </footer>


    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="js/loadComponents.js"></script>
    <script>
    $(function () {
        $("#navbar-placeholder").load("navbar.html");
    });
    
</script>
</body>
</html>
